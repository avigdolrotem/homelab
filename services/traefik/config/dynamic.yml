# Traefik dynamic configuration — reloaded automatically on change (no restart needed).

# ── TLS Options ───────────────────────────────────────────────────────────────
tls:
  options:
    default:
      minVersion: "VersionTLS12"
      cipherSuites:
        - "TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384"
        - "TLS_ECDHE_RSA_WITH_CHACHA20_POLY1305"
        - "TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256"
      curvePreferences:
        - "CurveP521"
        - "CurveP384"

    # Applied globally via entrypoint — enforces TLS 1.3 for all HTTPS routes
    modern:
      minVersion: "VersionTLS13"

# ── Server Transports ─────────────────────────────────────────────────────────
http:
  serversTransports:
    # For services that serve HTTPS internally with a self-signed cert (e.g. code-server).
    # Applied per-service via label — NOT globally.
    skip-verify:
      insecureSkipVerify: true

  middlewares:

    # ── Security headers (general apps) ──────────────────────────────────────
    security-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        referrerPolicy: "same-origin"
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Robots-Tag: "none,noarchive,nosnippet,notranslate,noimageindex"
          server: ""
          X-Powered-By: ""
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsSeconds: 31536000
        stsPreload: true

    # ── Secure headers (sensitive apps — stricter CSP, longer HSTS) ──────────
    secure-headers:
      headers:
        accessControlAllowMethods:
          - GET
          - OPTIONS
          - PUT
          - POST
          - DELETE
          - PATCH
        accessControlMaxAge: 100
        hostsProxyHeaders:
          - "X-Forwarded-Host"
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        sslProxyHeaders:
          X-Forwarded-Proto: "https"
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsSeconds: 63072000
        stsPreload: true
        contentSecurityPolicy: "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; media-src 'self'; object-src 'none'; child-src 'self'; frame-src 'self'; worker-src 'self'; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; manifest-src 'self';"

    # ── Authentik SSO forward auth ────────────────────────────────────────────
    # Any router with this middleware will require an active Authentik session.
    # Unauthenticated requests are redirected to auth.yourdomain.com/login.
    authentik-auth:
      forwardAuth:
        address: "http://authentik-server:9000/outpost.goauthentik.io/auth/traefik"
        trustForwardHeader: true
        authResponseHeaders:
          - X-authentik-username
          - X-authentik-groups
          - X-authentik-email
          - X-authentik-name
          - X-authentik-uid
          - X-authentik-jwt
          - X-authentik-meta-jwks
          - X-authentik-meta-outpost
          - X-authentik-meta-provider
          - X-authentik-meta-app
          - X-authentik-meta-version

    # ── Basic auth (emergency fallback — not wired to any router by default) ──
    # Useful if Authentik is down. Wire to a router by adding this middleware label.
    # Generate users: htpasswd -nbB admin 'your-password'
    auth:
      basicAuth:
        usersFile: "/run/secrets/traefik_users"
        realm: "Traefik Dashboard"

    # ── Rate limiting ─────────────────────────────────────────────────────────
    rate-limit:
      rateLimit:
        average: 50
        burst: 100

    # ── Compression ───────────────────────────────────────────────────────────
    compression:
      compress:
        excludedContentTypes:
          - "text/event-stream"
